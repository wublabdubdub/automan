# YMatrix MARS3 master-only target fragment.
all:
  children:
    ymatrix_mars3:
      vars:
        db_type: ymatrix
        storage_engine: mars3
        test_mode: master_only

        db_host: 172.16.100.62
        db_port: 5433
        db_name: tpcc
        db_user: zhangchen
        db_password: "YMatrix@123"

        # SSH metadata for collector checks and remote metric collection.
        # config_host is optional; when omitted, db_host is reused.
        config_user: mxadmin
        config_password: "mxadmin"
        config_workdir: /home/mxadmin/automan
        gpconfig_command: gpconfig

        # host_facts is only used by `./automan param --offline`.
        # Normal `./automan param` probes config_host/db_host live before
        # rendering memory-sensitive gpconfig commands.
        # host_facts:
        #   cpu_threads: 64
        #   memory_gb: 64

        database_parameters:
          max_connections: "1050"

        mars3_options:
          prefer_load_mode: single
          rowstore_size: 64
          compresstype: zstd
          compresslevel: 1
          compress_threshold: 1200

        manual_parameter_commands: []
