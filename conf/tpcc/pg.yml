# PostgreSQL single-node TPC-C template.
# Copy with: ./configure -c tpcc/pg -o automan.yml
all:
  vars:
    benchmark: tpcc
    campaign_id:

  children:
    # Execution host: automan and BenchmarkSQL run here.
    bench:
      hosts:
        bench01:
          ansible_host: 172.16.100.143
          ansible_port: 22
          ansible_user: root
          ansible_password: ""
          ansible_connection: local
          automan_workdir: /root/automan

    # Benchmark target. The group name, "pg", becomes the target id.
    pg:
      vars:
        # Profile selector. This maps to postgresql_heap_single_node.
        db_type: postgresql
        storage_engine: heap
        test_mode: single_node

        # TPC-C matrix. Warehouses x terminals are expanded into individual runs.
        tpcc_warehouses: [100]
        tpcc_terminals: [100, 500]
        tpcc_load_workers: 32
        tpcc_run_mins: 15

        # Database connection used by BenchmarkSQL.
        db_host: 192.168.100.29
        db_port: 5232
        db_name: postgres
        db_user: zhangchen
        db_password: ""

        # Config host metadata used only to render manual parameter commands.
        config_host: 192.168.100.29
        config_port: 22
        config_user: 12pg
        config_password: ""
        config_workdir: /home/12pg/automan
        postgresql_conf: /home/12pg/data/postgresql.conf
        restart_command: pg_ctl restart -D /home/12pg/data

        # Hardware notes. These are recorded in the plan; automan does not probe them.
        host_facts:
          cpu_threads: 64
          memory_gb: 251

        # Parameter recommendations. Automan only renders manual commands.
        database_parameters:
          max_connections: "550"
          shared_buffers: 62GB
          effective_cache_size: 175GB
          work_mem: 116MB
          maintenance_work_mem: 12GB
          checkpoint_timeout: 30min
          max_wal_size: 64GB

        # Optional override. Leave empty to let automan render from database_parameters.
        manual_parameter_commands: []
