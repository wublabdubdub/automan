---
- name: Ensure run parent directories exist
  ansible.builtin.file:
    path: "{{ automan_root }}/{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - runs
    - runs/jobs
    - work/tpcc
  tags:
    - tpcc_prepare

- name: Validate TPC-C inventory before run
  ansible.builtin.command:
    argv:
      - "{{ automan_python }}"
      - -m
      - automan_core
      - validate
      - -i
      - "{{ automan_config_file }}"
  args:
    chdir: "{{ automan_root }}"
  register: tpcc_prepare_result
  changed_when: false
  failed_when: false
  tags:
    - tpcc_prepare

- name: Show formatted TPC-C validation failure
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ tpcc_prepare_result.stdout_lines | default([]) }}"
  loop_control:
    label: ""
  when:
    - tpcc_prepare_result.rc != 0
    - tpcc_prepare_result.stdout_lines | default([]) | length > 0
  tags:
    - tpcc_prepare

- name: Show formatted TPC-C validation stderr
  ansible.builtin.debug:
    msg: "{{ item }}"
  loop: "{{ tpcc_prepare_result.stderr_lines | default([]) }}"
  loop_control:
    label: ""
  when:
    - tpcc_prepare_result.rc != 0
    - tpcc_prepare_result.stderr_lines | default([]) | length > 0
  tags:
    - tpcc_prepare

- name: Fail after formatted TPC-C validation output
  ansible.builtin.fail:
    msg: >-
      {{ (tpcc_prepare_result.stdout | default('') | regex_search('(?m)^\[FAIL\].*')) | default('TPC-C inventory validation failed', true) }}
      {% set hints = tpcc_prepare_result.stdout | default('') | regex_findall('(?m)^\[HINT\].*') %}
      {% if hints | length > 0 %} | {{ hints[-3:] | join(' | ') }}{% endif %}
      (rc={{ tpcc_prepare_result.rc }}; command: {{ automan_python }} -m automan_core validate -i {{ automan_config_file }})
  when: tpcc_prepare_result.rc != 0
  tags:
    - tpcc_prepare

- name: Remind that database parameter changes are manual only
  ansible.builtin.debug:
    msg: "Automan generated manual parameter commands only; this playbook never applies database parameter changes."
  tags:
    - tpcc_prepare
