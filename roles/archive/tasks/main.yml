---
- name: Archive latest campaign inputs and outputs
  ansible.builtin.shell: |
    set -euo pipefail
    archive_id="$(date +%Y%m%d-%H%M%S)-ansible"
    archive_dir="runs/archives/$archive_id"
    mkdir -p "$archive_dir"
    if [ -f {{ automan_config_file | quote }} ]; then
      cp -f {{ automan_config_file | quote }} "$archive_dir/automan-input.yml"
    fi
    latest="$(ls -1dt runs/campaigns/* 2>/dev/null | head -n 1 || true)"
    if [ -n "$latest" ]; then
      mkdir -p "$archive_dir/campaign"
      cp -a "$latest/." "$archive_dir/campaign/"
    fi
    echo "$archive_dir"
  args:
    chdir: "{{ automan_root }}"
    executable: /bin/bash
  register: archive_result
  changed_when: true
  tags:
    - archive

- name: Show archive destination
  ansible.builtin.debug:
    msg: "{{ archive_result.stdout }}"
  tags:
    - archive
