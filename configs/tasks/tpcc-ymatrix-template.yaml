# benchmark: 当前阶段只支持 tpcc。
benchmark: tpcc

# execution: automan 和 BenchmarkSQL 实际运行的位置。
execution:
  # host: 执行机 IP。正式执行固定为 172.16.100.143。
  host: 172.16.100.143
  # port: 执行机 SSH 端口，仅用于记录和本机校验。
  port: 22
  # user: 执行机用户，仅用于记录。
  user: root
  # workdir: 执行机上的 automan 目录。
  workdir: /root/automan

# matrix: TPC-C 压测矩阵。
matrix:
  # warehouses: 仓数列表。
  warehouses: [100, 1000]
  # terminals: 并发终端数列表。
  terminals: [100, 500, 1000]
  # load_workers: BenchmarkSQL 装载数据时的并发 worker 数。
  load_workers: 32
  # run_mins: 每个压测 run 的持续分钟数。
  run_mins: 60

# targets: 可以同时放 heap 和 mars3 两个 target。
targets:
  # id: target 的唯一标识，会进入 run_id。
  - id: ymatrix_heap_master_only
    # profile: YMatrix heap master only profile。
    profile: ymatrix_heap_master_only

    # connection: 连接信息。automan 只用 database 连接做压测，不执行 gpconfig。
    connection:
      # config_ssh: 远程采集检查和采集用 SSH 信息。
      config_ssh:
        # host: 可选；省略时复用 database.host。仅当 SSH 主机不同于数据库监听地址时填写。
        # host: 172.16.100.29
        # port: 可选；省略时默认 22。
        # port: 22
        # user: 远程采集检查和采集用的 OS 用户。
        user: zhangchen
        # password: 不建议写明文；需要时可临时填写，计划文件会脱敏。
        password: ""
        # workdir: 配置机工作目录，仅用于记录。
        workdir: /home/zhangchen/automan

      # database: BenchmarkSQL JDBC 连接目标。
      database:
        # host: YMatrix master host。
        host: 172.16.100.29
        # port: YMatrix/PostgreSQL 协议端口。
        port: 5432
        # name: 压测数据库名。
        name: postgres
        # user: 压测数据库用户。
        user: zhangchen
        # password: 压测数据库密码。
        password: ""

      # gpconfig_command: 手工参数修改命令路径。
      gpconfig_command: gpconfig
    # database_parameters: 推荐或确认后的 YMatrix 参数。automan 只生成手工命令，不执行。
    database_parameters:
      # max_connections: 最大连接数，应大于最大 terminals 并留出管理连接余量。
      # max_connections: "1050"

  # id: mars3 target 的唯一标识。
  - id: ymatrix_mars3_master_only
    # profile: YMatrix mars3 master only profile。
    profile: ymatrix_mars3_master_only

    # connection: 可与 heap target 相同。
    connection:
      # config_ssh: 远程采集检查和采集用 SSH 信息。
      config_ssh:
        # host: 可选；省略时复用 database.host。仅当 SSH 主机不同于数据库监听地址时填写。
        # host: 172.16.100.29
        # port: 可选；省略时默认 22。
        # port: 22
        # user: 远程采集检查和采集用的 OS 用户。
        user: zhangchen
        # password: 不建议写明文；需要时可临时填写，计划文件会脱敏。
        password: ""
        # workdir: 配置机工作目录，仅用于记录。
        workdir: /home/zhangchen/automan

      # database: BenchmarkSQL JDBC 连接目标。
      database:
        # host: YMatrix master host。
        host: 172.16.100.29
        # port: YMatrix/PostgreSQL 协议端口。
        port: 5432
        # name: 压测数据库名。
        name: postgres
        # user: 压测数据库用户。
        user: zhangchen
        # password: 压测数据库密码。
        password: ""

      # gpconfig_command: 手工参数修改命令路径。
      gpconfig_command: gpconfig
    # database_parameters: 推荐或确认后的 YMatrix 参数。automan 只生成手工命令，不执行。
    database_parameters:
      # max_connections: 最大连接数，应大于最大 terminals 并留出管理连接余量。
      # max_connections: "1050"

    # mars3_options: MARS3 建表参数，会渲染到 tableCreates.sql。
    mars3_options:
      # prefer_load_mode: MARS3 装载模式，默认 single。
      prefer_load_mode: single
      # rowstore_size: MARS3 rowstore_size，默认 64。
      rowstore_size: 64
      # compresstype: 压缩算法，默认 zstd。
      compresstype: zstd
      # compresslevel: 压缩级别，默认 1。
      compresslevel: 1
      # compress_threshold: 压缩阈值，默认 1200。
      compress_threshold: 1200
