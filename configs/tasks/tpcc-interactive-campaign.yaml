task:
  name: tpcc-interactive-campaign
  type: interactive_campaign
  description: Interactive TPC-C campaign generated by automan run.

include:
  benchmark: ../benchmarks/tpcc.yaml
  collectors: ../collectors/default.yaml

ui:
  database_types:
    - postgresql
    - ymatrix
  skip_single_option_steps: true
  default_test_type: tpcc

campaign:
  scheduling:
    different_hosts: parallel
    same_host: serial_by_selection_order
  progress:
    enabled: true
    status_file: progress.json

