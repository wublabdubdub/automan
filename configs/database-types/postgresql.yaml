database_type:
  name: postgresql
  display_name: PostgreSQL
  protocol: postgresql
  driver: psycopg
  default_port: 5432

  storage_engines:
    - name: heap
      display_name: heap
      default: true

  test_modes:
    - name: single_node
      display_name: single node
      default: true

  probe:
    version_sql: "select version()"
    settings_sql: "select name, setting, unit from pg_settings"

  config_apply:
    method: postgresql_conf
    config_file_prompt: "postgresql.conf path"
    restart_command_prompt: "PostgreSQL restart command"

