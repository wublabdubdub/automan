# Default collector profile for TPC-C readiness checks and future run collection.
# `automan check` must pass these tool and permission checks before benchmark runs.
collectors:
  enabled: true

  # System metrics are sampled every 1 second on database hosts by default.
  system:
    enabled: true
    interval_seconds: 1
    host_roles:
      - database
    tools:
      - vmstat
      - iostat
      - pidstat
      - mpstat

  # perf uses `perf record`, not flame graphs or perf stat.
  # The default records at 99 Hz during runBenchmark.sh only.
  perf:
    enabled: true
    phases:
      - runBenchmark.sh
    host_roles:
      - database
    frequency: 99
    call_graph: fp
    record_scope: system
