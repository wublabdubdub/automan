    - code [ref=e525]: runBenchmark.sh.stderr.log
    - text: 均为空。YMatrix Heap 三组测试虽然最终状态为 success，并且 BenchmarkSQL 输出了 Measured tpmC，但 stderr 中存在大量异常堆栈，主要错误为：
  - code [ref=e527]: "org.postgresql.util.PSQLException: ERROR: duplicate key value violates unique constraint \"bmsql_oorder_pkey\""
  - paragraph [ref=e528]: 这些错误意味着 YMatrix Heap 测试过程中存在大量订单主键冲突。由于 TPC-C 的 New Order 事务是 tpmC 的核心指标，重复键错误会直接影响测试语义和结果可信度。当前 Automan 将 runBenchmark 阶段定义为“进程退出 0 且最终 Measured tpmC 存在则保留结果”，因此这些 run 被列为 success；但从正式测试报告角度，应将 YMatrix Heap 的结果标记为“有大量异常，需复核后再作为有效横向对比依据”。
  - heading "5.2 对结果解释的影响" [level=3] [ref=e529]
  - paragraph [ref=e530]: 100 和 500 terminals 下，PG12 与 YMatrix Heap 的 tpmC 接近，但 YMatrix Heap 同时伴随大量重复键异常。因此不能简单解读为“两者性能相当”。按工程口径判断：在当前测试条件和当前日志质量下，PG12 给出了无 stderr 错误输出、可复核的结果；YMatrix Heap 虽然最终 tpmC 接近 PG12，但测试过程存在大量事务异常，结果需要重新验证。
  - paragraph [ref=e531]: 1000 terminals 下，YMatrix Heap 的吞吐明显下降，同时 CPU 与 Run Queue 激增，并继续存在大量重复键异常。该结果更像是系统在异常和高并发压力下进入退化状态，而不是一个稳定的高并发 TPC-C 性能点。
