  - heading "PG12 与 YMatrix Heap TPC-C 对比测试报告" [level=1] [ref=e19]
  - heading "1. 摘要" [level=2] [ref=e20]
  - paragraph [ref=e21]:
    - text: 本报告基于
    - code [ref=e22]: 172.16.100.143:/root/automan
    - text: 上的 TPC-C 自动化测试结果，对 PostgreSQL 12 heap 单节点目标（下文简称 PG12）与 YMatrix heap master-only 目标（下文简称 YMatrix Heap）进行性能和资源占用对比分析。
  - paragraph [ref=e23]: 本次分析覆盖吞吐结果、并发扩展趋势、CPU/内存/IO 资源占用、perf 采样产物、BenchmarkSQL 标准输出和错误日志。报告重点不只呈现最终 tpmC 数字，也关注测试过程是否稳定、日志是否干净，以及资源消耗与吞吐之间是否匹配。
