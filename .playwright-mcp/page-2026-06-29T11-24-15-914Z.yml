  - paragraph [ref=e359]: CPU 维度可以看到三个明显特征：
  - list [ref=e360]:
    - listitem [ref=e361]: 1. 在 100 terminals 下，YMatrix Heap 的 CPU 平均使用率比 PG12 高约 10.6 个百分点，但 tpmC 略低。
    - listitem [ref=e362]: 2. 在 500 terminals 下，YMatrix Heap 的 CPU P95 已达到 92.27%，Run Queue P95 达到 141.20，说明调度排队压力已经明显高于 PG12。
    - listitem [ref=e363]: 3. 在 1000 terminals 下，YMatrix Heap CPU 平均值达到 90.01%，Run Queue 平均值达到 297.08，P95 达到 810.00，系统已处于严重 CPU/调度拥塞状态；PG12 虽然 Run Queue 也升高，但 CPU 平均值仍为 53.19%，吞吐没有塌陷。
  - paragraph [ref=e364]: 从单位吞吐 CPU 成本看，YMatrix Heap 在 1000 terminals 下的 CPU 使用率与 tpmC 明显失衡。按每 1 万 tpmC 消耗的 CPU 百分点粗略估算，PG12 约为 3.87，YMatrix Heap 约为 20.80，说明 YMatrix Heap 在高并发下花费了更多 CPU，但有效事务吞吐大幅下降。
