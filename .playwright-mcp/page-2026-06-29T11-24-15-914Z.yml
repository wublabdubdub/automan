  - heading "6.2 perf 热点方向" [level=3] [ref=e589]
  - paragraph [ref=e590]:
    - text: PG12 的 perf report 顶层热点主要落在 PostgreSQL 的服务端执行路径，例如
    - code [ref=e591]: PostmasterMain
    - text: 、
    - code [ref=e592]: ServerLoop
    - text: 、
    - code [ref=e593]: PostgresMain
    - text: 、
    - code [ref=e594]: PortalRun
    - text: 、
    - code [ref=e595]: ExecutorRun
    - text: 等路径，符合数据库执行 SQL 事务时的典型表现。
  - paragraph [ref=e596]:
    - text: YMatrix Heap 在 100 和 500 terminals 下同样可见 PostgreSQL/YMatrix 服务端主循环和执行路径。到 1000 terminals 时，perf report 顶层出现大量 kernel syscall/write 相关路径，例如
    - code [ref=e597]: entry_SYSCALL_64_after_hwframe
    - text: 、
    - code [ref=e598]: do_syscall_64
    - text: 、
    - code [ref=e599]: vfs_write
    - text: 、
    - code [ref=e600]: ksys_write
    - text: 、
    - code [ref=e601]: new_sync_write
    - text: 。结合 stderr 中大量异常输出和 CPU/Run Queue 升高，可以判断 1000 terminals 下 YMatrix Heap 的资源消耗已经明显偏离正常事务执行路径，异常处理和写日志/写输出路径可能放大了系统压力。
  - heading "7. 分项对比结论" [level=2] [ref=e602]
  - heading "7.1 吞吐" [level=3] [ref=e603]
  - paragraph [ref=e604]: PG12 在三组并发下均高于 YMatrix Heap。100 和 500 terminals 下领先幅度小，但结果无 stderr 错误输出；1000 terminals 下 PG12 高于对比对象，且没有错误日志。YMatrix Heap 在 1000 terminals 下 tpmC 下降到 43,284.76，说明当前配置和当前测试形态下无法稳定承载该并发压力。
  - heading "7.2 资源效率" [level=3] [ref=e605]
  - paragraph [ref=e606]: YMatrix Heap 在 100 和 500 terminals 下使用了更高 CPU 和更多写 IO，但没有获得更高 tpmC。1000 terminals 下 CPU 平均值达到 90.01%，但吞吐只有 PG12 的约 31.46%，资源效率明显下降。
  - paragraph [ref=e607]: PG12 的资源曲线更平滑：并发提升时 CPU 和 Run Queue 上升，但吞吐没有下降；磁盘 util 虽高，但写等待很低，没有表现出明显 IO 等待瓶颈。
  - heading "7.3 稳定性和有效性" [level=3] [ref=e608]
  - paragraph [ref=e609]: PG12 三组测试没有 stderr 输出，结果可直接作为本轮有效数据。YMatrix Heap 三组测试全部存在大量重复键异常，尤其 500 terminals 下 stderr 超过 324 万行，重复键错误出现超过 23 万次。即使 Automan 列为 success，也不建议将这些结果直接作为最终性能结论，应先定位重复键问题并重跑。
  - heading "8. 风险与限制" [level=2] [ref=e610]
  - list [ref=e611]:
    - listitem [ref=e612]: 1. YMatrix Heap 的重复键异常会破坏 TPC-C 测试语义，当前 YMatrix Heap 结果应标记为“异常条件下的观测值”。
    - listitem [ref=e613]:
      - text: 2. 两侧数据库实际生效参数不完全一致，尤其
      - code [ref=e614]: work_mem
      - text: 、
      - code [ref=e615]: effective_cache_size
      - text: 、
      - code [ref=e616]: maintenance_work_mem
      - text: 差异较大；本报告反映当前实际部署参数下的观测结果，不构成严格等参数对比。
    - listitem [ref=e617]:
      - text: 3. 本报告资源分析聚焦
      - code [ref=e618]: runBenchmark.sh
      - text: 阶段，不覆盖建表和装载阶段的完整资源消耗。
    - listitem [ref=e619]: 4. IO 统计来自数据库主机物理块设备层，未进一步拆分 WAL、数据文件、日志输出等具体写入来源。
    - listitem [ref=e620]: 5. YMatrix Heap 1000 terminals 的 perf data 未保留，后续深入分析需要重新采样。
    - listitem [ref=e621]: 6. 本次对比是单次结果对比，没有包含多轮重复测试的方差和置信区间。
  - heading "9. 建议" [level=2] [ref=e622]
  - list [ref=e623]:
    - listitem [ref=e624]:
      - text: 1. 优先排查 YMatrix Heap 的
      - code [ref=e625]: bmsql_oorder_pkey
      - text: 重复键问题，确认是 BenchmarkSQL 事务逻辑、DDL/profile、sequence 初始化、并发事务隔离，还是 YMatrix master-only 执行路径导致。
    - listitem [ref=e626]: 2. 在修复重复键异常前，不建议将 YMatrix Heap 当前 tpmC 与 PG12 直接作为正式性能结论对外发布。
    - listitem [ref=e627]:
      - text: 3. 修复后按相同矩阵重跑 100、500、1000 terminals，并要求
      - code [ref=e628]: runBenchmark.sh.stderr.log
      - text: 无 ERROR/Exception 后再进入正式横向对比。
    - listitem [ref=e629]:
      - text: 4. 对 1000 terminals 单独增加一次 YMatrix Heap perf 完整采样，保留
      - code [ref=e630]: perf.data
      - text: 、
      - code [ref=e631]: perf script
      - text: 和
      - code [ref=e632]: perf report
      - text: ，用于确认 CPU 消耗是否仍集中在 syscall/write 或异常相关路径。
    - listitem [ref=e633]: 5. 若后续目标是评估稳定上限，建议增加 600、700、800、900 terminals 梯度，定位 YMatrix Heap 从平台期到塌陷区间的拐点。
  - heading "10. 结论" [level=2] [ref=e634]
  - paragraph [ref=e635]:
    - text: 在本轮
    - code [ref=e636]: 20260628-224417-tpcc
    - text: 测试中，基于两侧数据库实际生效参数，PG12 表现为结果无 stderr 错误输出、资源曲线较稳定、并发提升后仍能获得更高吞吐；YMatrix Heap 在 100 和 500 terminals 下最终 tpmC 与 PG12 接近，但资源消耗更高，并且存在大量重复键异常。到 1000 terminals 时，YMatrix Heap 出现吞吐明显下降、CPU 接近接近满载、Run Queue 大幅积压，同时继续伴随大量异常日志。
  - paragraph [ref=e637]: 因此，本轮可确认的结论为：在当前实际部署参数与当前测试执行结果下，PG12 整体优于 YMatrix Heap，尤其在 1000 terminals 高并发场景下差距较大。YMatrix Heap 当前结果存在大量异常，需要先解决重复键问题，并在明确参数基线后重跑，才能作为严格意义上的有效 TPC-C 横向对比数据。