---
- name: Remove BenchmarkSQL TPC-C objects
  hosts: "{{ automan_hosts | default('bench') }}"
  gather_facts: false
  vars:
    automan_inventory_sources_safe: "{{ ansible_inventory_sources | default(['automan.yml'], true) }}"
    automan_config_file: "{{ automan_config | default(automan_inventory_sources_safe[0], true) }}"
    automan_root: "{{ automan_workdir | default('/root/automan', true) }}"
    automan_python: "{{ python_bin | default('python3.8', true) }}"
  tasks:
    - name: Drop bmsql_% tables and sequences through automan inventory
      ansible.builtin.command:
        argv:
          - "{{ automan_python }}"
          - -c
          - "from pathlib import Path; from automan_core.cleanup import cleanup_tpcc; raise SystemExit(cleanup_tpcc(Path.cwd(), Path(r'''{{ automan_config_file }}''')))"
      args:
        chdir: "{{ automan_root }}"
      changed_when: true
      tags:
        - tpcc_rm
